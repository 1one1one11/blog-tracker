name: blog-tracker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore tracker state
        uses: actions/cache/restore@v4
        with:
          path: data/runtime/
          key: blog-state-${{ github.run_id }}
          restore-keys: |
            blog-state-

      - name: Restore site archive
        uses: actions/cache/restore@v4
        with:
          path: data/site/
          key: blog-site-${{ github.run_id }}
          restore-keys: |
            blog-site-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync followings
        env:
          NAVER_FOLLOWINGS_URL: "https://section.blog.naver.com/connect/ViewMoreFollowings.naver?blogId=neo-anderson&widgetSeq=1306670"
        run: python scripts/sync_followings.py --url "$NAVER_FOLLOWINGS_URL"

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          BLOG_TRACKER_TIMEZONE: Asia/Seoul
          BLOG_TRACKER_DAYS_BACK: "2"
          NAVER_FOLLOWINGS_URL: "https://section.blog.naver.com/connect/ViewMoreFollowings.naver?blogId=neo-anderson&widgetSeq=1306670"
        run: python scripts/run_tracker.py

      - name: Build static site
        if: always()
        run: python scripts/build_site.py

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-digest
          path: output/

      - name: Configure Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Save tracker state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/runtime/
          key: blog-state-${{ github.run_id }}

      - name: Save site archive
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/site/
          key: blog-site-${{ github.run_id }}

  deploy:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
